<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</head>
<body>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg custom-nav sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
            <div class="logo-box"><i class="bi bi-journal-check"></i></div>
            <div>
                <h5 class="mb-0">Student Planner</h5>
                <small class="opacity-75">Organize. Plan. Achieve.</small>
            </div>
        </a>

        <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn icon-btn" title="Toggle theme">
                <i class="bi bi-sun-fill"></i>
            </button>
            <a href="index.html" class="btn planner-btn">
                <i class="bi bi-house"></i> Home
            </a>
        </div>
    </div>
</nav>

<div class="planner-section">
    <div class="container">

        <div class="text-center mb-4">
            <h1 class="plan-text">Assignment Planner</h1>
            <p class="opacity-60">Add, manage, and track all your assignments in one place.</p>
        </div>

        <!-- STATS DASHBOARD -->
        <div class="stats-row mb-4">
            <div class="stat-card">
                <div class="stat-icon total"><i class="bi bi-list-task"></i></div>
                <div>
                    <div class="stat-num" id="totalTasks">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon done"><i class="bi bi-check2-circle"></i></div>
                <div>
                    <div class="stat-num" id="completedTasks">0</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending"><i class="bi bi-hourglass-split"></i></div>
                <div>
                    <div class="stat-num" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon overdue"><i class="bi bi-exclamation-triangle"></i></div>
                <div>
                    <div class="stat-num" id="overdueTasks">0</div>
                    <div class="stat-label">Overdue</div>
                </div>
            </div>
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-section mb-4">
            <div class="d-flex justify-content-between mb-1">
                <span class="small opacity-75">Overall Progress</span>
                <span class="small fw-semibold" id="progressPct">0%</span>
            </div>
            <div class="progress" style="height:8px;border-radius:8px;">
                <div class="progress-bar" id="progressBar" style="width:0%;transition:width .5s ease;"></div>
            </div>
        </div>

        <div class="planner-box">

            <!-- ADD TASK FORM -->
            <div class="form-section mb-4">
                <h6 class="section-label mb-3"><i class="bi bi-plus-circle"></i> Add New Assignment</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <input id="taskTitle" class="form-control" placeholder="Assignment title" autocomplete="off">
                    </div>
                    <div class="col-md-3">
                        <select id="taskSubject" class="form-select">
                            <option value="">Select Subject</option>
                            <option>Math</option>
                            <option>Science</option>
                            <option>Computer</option>
                            <option>English</option>
                            <option>History</option>
                            <option>Geography</option>
                            <option>Physics</option>
                            <option>Chemistry</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input id="taskDate" type="date" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <select id="taskPriority" class="form-select">
                            <option value="">Priority</option>
                            <option value="high">🔴 High</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="low">🟢 Low</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <input id="taskNotes" class="form-control" placeholder="Optional notes...">
                    </div>
                    <div class="col-12">
                        <button id="addBtn" class="btn add-btn w-100">
                            <i class="bi bi-plus-lg"></i> Add Task
                        </button>
                    </div>
                </div>
            </div>

            <hr class="divider my-4">

            <!-- FILTERS, SORT, SEARCH -->
            <div class="controls-row mb-4">
                <div class="search-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input id="searchInput" class="form-control search-input" placeholder="Search tasks...">
                </div>
                <select id="filterSubject" class="form-select filter-select">
                    <option value="all">All Subjects</option>
                    <option>Math</option>
                    <option>Science</option>
                    <option>Computer</option>
                    <option>English</option>
                    <option>History</option>
                    <option>Geography</option>
                    <option>Physics</option>
                    <option>Chemistry</option>
                </select>
                <select id="filterStatus" class="form-select filter-select">
                    <option value="all">All Tasks</option>
                    <option value="active">Active</option>
                    <option value="done">Completed</option>
                </select>
            </div>

            <!-- SORT CHIPS -->
            <div class="sort-chips mb-3">
                <span class="sort-label">Sort:</span>
                <button class="chip active" data-sort="deadline">📅 Deadline</button>
                <button class="chip" data-sort="priority">⚡ Priority</button>
                <button class="chip" data-sort="status">✅ Status</button>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-bar mb-4">
                <button id="clearCompletedBtn" class="btn btn-sm action-outline-btn">
                    <i class="bi bi-trash3"></i> Clear Completed
                </button>
                <button id="exportPDFBtn" class="btn btn-sm action-outline-btn">
                    <i class="bi bi-download"></i> Export PDF
                </button>
            </div>

            <!-- TASK LIST -->
            <div id="taskList"></div>

        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-header border-0">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Task</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label small">Title</label>
                    <input id="editTitle" class="form-control" placeholder="Assignment title">
                </div>
                <div class="mb-3">
                    <label class="form-label small">Subject</label>
                    <select id="editSubject" class="form-select">
                        <option value="">Select Subject</option>
                        <option>Math</option>
                        <option>Science</option>
                        <option>Computer</option>
                        <option>English</option>
                        <option>History</option>
                        <option>Geography</option>
                        <option>Physics</option>
                        <option>Chemistry</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small">Deadline</label>
                        <input id="editDeadline" type="date" class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Priority</label>
                        <select id="editPriority" class="form-select">
                            <option value="high">🔴 High</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="low">🟢 Low</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Notes</label>
                    <input id="editNotes" class="form-control" placeholder="Optional notes...">
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="saveEditBtn" class="btn add-btn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
